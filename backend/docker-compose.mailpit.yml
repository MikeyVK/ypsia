# Optional local alternative when Docker is available.
# Docker is not a development prerequisite for issue 18.
services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: ypsia-mailpit
    restart: unless-stopped
    env_file:
      - ./mailpit.env
    ports:
      - "127.0.0.1:8025:8025"
      - "127.0.0.1:1025:1025"
    volumes:
      - ./data/mailpit:/data
