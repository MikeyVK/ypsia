version: "1.0"

freeform_exceptions:
  - "good first issue"
  - "help wanted"
  - "wontfix"
  - "duplicate"
  - "invalid"

# Dynamic label patterns - validated but not pre-created
# These labels are created on-demand when needed
label_patterns:
  - pattern: "^parent:\\d+$"
    description: "Parent issue reference for child issues"
    color: "EDEDED"
    example: "parent:91"

labels:
  # TYPE - Issue Classification (7 labels)
  # What kind of work is being done
  - name: "type:feature"
    color: "1D76DB"
    description: "New functionality or capability"
  
  - name: "type:bug"
    color: "D73A4A"
    description: "Something isn't working"
  
  - name: "type:refactor"
    color: "0E8A16"
    description: "Code improvement without behavior change"
  
  - name: "type:docs"
    color: "0075CA"
    description: "Documentation changes"
  
  - name: "type:research"
    color: "1D76DB"
    description: "Research and exploration work"
  
  - name: "type:epic"
    color: "5319E7"
    description: "Large feature with multiple sub-issues"
  
  - name: "type:chore"
    color: "7057FF"
    description: "Maintenance tasks and housekeeping"
  
  # PRIORITY - Urgency Level (5 labels)
  # How important/urgent is this work
  - name: "priority:critical"
    color: "B60205"
    description: "Must be fixed immediately"
  
  - name: "priority:high"
    color: "D93F0B"
    description: "Should be addressed soon"
  
  - name: "priority:medium"
    color: "FBCA04"
    description: "Normal priority"
  
  - name: "priority:low"
    color: "BFD4F2"
    description: "Low priority, nice to have"
  
  - name: "priority:triage"
    color: "EDEDED"
    description: "Needs prioritization"
  
  # PHASE - Workflow State (9 labels)
  # Which phase in the workflow (aligns with workflows.yaml)
  # Note: phase:tdd for issues, phase:red/green/refactor for commits (granularity)
  
  - name: "phase:research"
    color: "C5DEF5"
    description: "Research/discovery phase"
  
  - name: "phase:planning"
    color: "C5DEF5"
    description: "Planning phase"
  
  - name: "phase:design"
    color: "C5DEF5"
    description: "Design phase"
  
  - name: "phase:tdd"
    color: "0E8A16"
    description: "TDD implementation phase (issue-level)"
  
  - name: "phase:red"
    color: "D73A4A"
    description: "TDD red phase - write failing tests (commit-level)"
  
  - name: "phase:green"
    color: "0E8A16"
    description: "TDD green phase - make tests pass (commit-level)"
  
  - name: "phase:refactor"
    color: "FBCA04"
    description: "TDD refactor phase - improve code (commit-level)"
  
  - name: "phase:integration"
    color: "1D76DB"
    description: "Integration testing phase"
  
  - name: "phase:documentation"
    color: "0075CA"
    description: "Documentation phase"
  
  # SCOPE - Impact Area (6 labels)
  # Which part of the system is affected
  - name: "scope:architecture"
    color: "BFD4F2"
    description: "Architectural changes"
  
  - name: "scope:mcp-server"
    color: "BFD4F2"
    description: "MCP server internals"
  
  - name: "scope:platform"
    color: "BFD4F2"
    description: "GitHub/git platform integration"
  
  - name: "scope:tooling"
    color: "BFD4F2"
    description: "Development tooling"
  
  - name: "scope:workflow"
    color: "BFD4F2"
    description: "Workflow/process improvements"
  
  - name: "scope:documentation"
    color: "BFD4F2"
    description: "Documentation scope"

# ---------------------------------------------------------------------------
# CHANGELOG
# ---------------------------------------------------------------------------
# v1.0  (Issue #149 — Redesign create_issue tool)
#   REMOVED: status:* label category (status:open, status:in-progress,
#             status:closed, status:blocked) — workflow state is tracked via
#             GitHub issue state + phase:* labels instead of explicit status
#             labels. This avoids label proliferation and state drift.
#   CHANGED: parent:{n} is now a dynamic label pattern (see label_patterns
#             above) rather than a pre-created label. Labels are created
#             on-demand when a parent_issue is provided to create_issue.
#             Pattern: "^parent:\\d+$", color: EDEDED, example: "parent:91"
#   ADDED:   label_patterns section — declares dynamic label patterns that
#            are validated by regex but not pre-created in the repository.
# ---------------------------------------------------------------------------
